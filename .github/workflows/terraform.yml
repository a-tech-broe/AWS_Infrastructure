name: Terraform

# Branch-based environment promotion:
#
#   feature ──PR──► dev  ──push──►  deploy DEV
#                    │
#                    └──PR to stg ─────►  build + deploy STG   (on the PR itself)
#                              │
#                              └──PR──► main ──push──► deploy PROD (manual approval)
#
#   - Push to dev            -> deploy dev
#   - PR from dev into stg   -> deploy stg (auto, like dev)
#   - PR from stg into main  -> plan prod; merge to main -> deploy prod (approval)
on:
  push:
    branches: [dev, main]
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/terraform.yml"
      - ".tflint.hcl"
  pull_request:
    branches: [dev, stg, main]
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/terraform.yml"
      - ".tflint.hcl"

# OIDC: id-token lets a job mint a signed token AWS trusts. No static keys.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.14.3"

# Serialize per ref, and never cancel in-flight runs — a stg deploy now happens
# on the PR itself, so cancelling mid-apply would be unsafe.
concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Map the branch (push ref, or PR base branch) to a target environment.
  # ---------------------------------------------------------------------------
  target:
    name: Resolve target
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      env: ${{ steps.map.outputs.env }}
      dir: ${{ steps.map.outputs.dir }}
    steps:
      - name: Map branch to environment
        id: map
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            branch="${{ github.base_ref }}"
          else
            branch="${{ github.ref_name }}"
          fi
          case "$branch" in
            dev)  env=dev ;;
            stg)  env=stg ;;
            main) env=prod ;;
            *) echo "::error::branch '$branch' is not mapped to an environment"; exit 1 ;;
          esac
          echo "Target environment: $env"
          echo "env=$env" >> "$GITHUB_OUTPUT"
          echo "dir=environments/$env" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Scans & lint — every PR and push. No AWS access.
  # ---------------------------------------------------------------------------
  lint:
    name: Scan & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tflint --init
          tflint --recursive --format compact

      - name: Trivy IaC security scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL

  # ---------------------------------------------------------------------------
  # Plan the target environment on PRs into dev or main (review before merge).
  # Read-only. PRs into stg skip plan and deploy directly (see the deploy job).
  # Uses the pull_request OIDC sub, which the role trust already allows.
  # ---------------------------------------------------------------------------
  plan:
    name: Plan (${{ needs.target.outputs.env }})
    needs: [target, lint]
    if: github.event_name == 'pull_request' && (github.base_ref == 'dev' || github.base_ref == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ needs.target.outputs.dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -input=false

  # ---------------------------------------------------------------------------
  # Deploy the target environment:
  #   - push to dev/main          -> deploy dev / prod
  #   - PR from dev into stg       -> deploy stg (build + deploy on the PR)
  # Bound to the matching GitHub Environment, so `prod` can require manual
  # approval before it runs. Applies the exact plan it just computed, using the
  # environment-scoped OIDC sub.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (${{ needs.target.outputs.env }})
    needs: [target, lint]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.base_ref == 'stg')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ needs.target.outputs.env }}
    concurrency:
      group: deploy-${{ needs.target.outputs.env }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: ${{ needs.target.outputs.dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        run: terraform apply -input=false tfplan
