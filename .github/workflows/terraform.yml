name: Terraform

# PRs run scans + validation + plan (no changes to AWS).
# Merges to main run the actual deployments.
on:
  pull_request:
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/terraform.yml"
      - ".tflint.hcl"
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"

# Required for OIDC: id-token lets a job request a signed token from GitHub that
# AWS trusts. No long-lived AWS keys are stored anywhere.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.14.3"

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1. Scans & lint — runs on every PR and every push. No AWS access needed.
  # ---------------------------------------------------------------------------
  lint:
    name: Scan & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # avoids plugin download rate limits
        run: |
          tflint --init
          tflint --recursive --format compact

      - name: Trivy IaC security scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: "1" # fail the PR on findings at/above `severity`
          severity: HIGH,CRITICAL

  # ---------------------------------------------------------------------------
  # 2. Validate & plan per environment — read-only, needs AWS to read state.
  #    Runs on PRs (review the plan) and on main (gate before deploy).
  # ---------------------------------------------------------------------------
  plan:
    name: Plan (${{ matrix.environment }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, stg]
    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -input=false

  # ---------------------------------------------------------------------------
  # 3. Deploy — apply the changes. Only on a direct push to main, and only
  #    after scans + plan pass. Uses a GitHub Environment so you can require
  #    manual approval per environment (Settings -> Environments).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (${{ matrix.environment }})
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: true
      max-parallel: 1 # deploy environments one at a time, in listed order
      matrix:
        environment: [dev, stg]
    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
