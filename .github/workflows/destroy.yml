name: Destroy Environment

# Manual, approval-gated teardown of a single environment's infrastructure
# (VPC, NAT gateways, ECS cluster, etc.). Does NOT touch the state backend,
# CI role, or Parah access — use scripts/destroy-all.sh for a full teardown.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to destroy
        type: choice
        options: [dev, stg, prod]
        required: true
      confirm:
        description: Re-type the environment name to confirm
        type: string
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.14.3"

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  destroy:
    name: Destroy ${{ inputs.environment }}
    # Guard: the typed confirmation must match the selected environment.
    if: inputs.environment == inputs.confirm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Bound to the environment so prod (and any env with required reviewers)
    # must be approved before the destroy runs.
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: environments/${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
